{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "api-gateway.serviceAccountName" . }}
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
  annotations:
    {{- toYaml (.Values.global.serviceAccount.annotations | default dict) | nindent 4 }}
{{- end }}
