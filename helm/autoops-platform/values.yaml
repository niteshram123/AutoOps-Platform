global:
  registry: "localhost:5000"
  imageTag: "latest"
  imagePullPolicy: IfNotPresent
  environment: staging
  project: autoops

  labels:
    project: autoops
    managed-by: helm

  serviceAccount:
    create: true
    annotations: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    fsGroup: 1001

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  probes:
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    startup:
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 30

api-gateway:
  enabled: true
  replicaCount: 2
  image:
    name: autoops/api-gateway
  resources: {}
  logLevel: info
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: true
    className: nginx
    host: api.autoops.local
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: false
    minAvailable: 1

user-service:
  enabled: true
  replicaCount: 2
  image:
    name: autoops/user-service
  resources: {}
  logLevel: INFO
  service:
    type: ClusterIP
    port: 8000
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: false
    minAvailable: 1

metrics-collector:
  enabled: true
  replicaCount: 1
  image:
    name: autoops/metrics-collector
  resources: {}
  logLevel: info
  service:
    type: ClusterIP
    httpPort: 9091
    metricsPort: 9090
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  serviceMonitor:
    enabled: true
    interval: 30s
