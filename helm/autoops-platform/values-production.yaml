global:
  environment: production
  imageTag: "stable"

api-gateway:
  replicaCount: 3
  resources:
    requests: { cpu: "200m", memory: "256Mi" }
    limits: { cpu: "1000m", memory: "1Gi" }
  pdb:
    enabled: true
    minAvailable: 2
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

user-service:
  replicaCount: 3
  pdb:
    enabled: true
    minAvailable: 2
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 8

metrics-collector:
  replicaCount: 2
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
