server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # Use Docker embedded DNS resolver for runtime name resolution
    resolver 127.0.0.11 valid=30s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        default_type application/json;
        return 200 '{"status":"healthy","service":"autoops-dashboard"}';
    }

    location /api/prometheus/ {
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location /api/healing/ {
        proxy_pass http://healing-service:8888/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location /api/jenkins/ {
        # Use a variable so nginx resolves the name at runtime (avoids startup DNS error)
        set $jenkins_backend "http://jenkins:8080";
        proxy_pass $jenkins_backend;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location ~* \.(js|css|png|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
