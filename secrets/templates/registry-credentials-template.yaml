apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: NAMESPACE_PLACEHOLDER
type: kubernetes.io/dockerconfigjson
data:
  # Replace with: echo -n '{"auths":{"registry:5000":{"username":"user","password":"pass","auth":"base64(user:pass)"}}}' | base64
  .dockerconfigjson: PLACEHOLDER_BASE64_DOCKER_CONFIG
