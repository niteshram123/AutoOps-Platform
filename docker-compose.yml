version: "3.9"

services:
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
      target: production
    image: autoops/api-gateway:phase1
    container_name: autoops-api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - USER_SERVICE_URL=http://user-service:8000
      - METRICS_SERVICE_URL=http://metrics-collector:9091
      - LOG_LEVEL=info
    depends_on:
      user-service:
        condition: service_healthy
      metrics-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - autoops-network
    restart: unless-stopped
    labels:
      - "autoops.service=api-gateway"
      - "autoops.phase=1"
      - "autoops.version=1.0.0"

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
      target: production
    image: autoops/user-service:phase1
    container_name: autoops-user-service
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=user-service
      - SERVICE_VERSION=1.0.0
      - PORT=8000
      - LOG_LEVEL=INFO
      - MAX_USERS=1000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - autoops-network
    restart: unless-stopped
    labels:
      - "autoops.service=user-service"
      - "autoops.phase=1"
      - "autoops.version=1.0.0"

  metrics-collector:
    build:
      context: ./services/metrics-collector
      dockerfile: Dockerfile
      target: production
    image: autoops/metrics-collector:phase1
    container_name: autoops-metrics-collector
    ports:
      - "9091:9091"
      - "9090:9090"
    environment:
      - SERVICE_NAME=metrics-collector
      - VERSION=1.0.0
      - HTTP_PORT=9091
      - METRICS_PORT=9090
      - LOG_LEVEL=info
      - SCRAPE_INTERVAL_SECONDS=15
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - autoops-network
    restart: unless-stopped
    labels:
      - "autoops.service=metrics-collector"
      - "autoops.phase=1"
      - "autoops.version=1.0.0"

networks:
  autoops-network:
    name: autoops-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
