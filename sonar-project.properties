sonar.projectKey=autoops-platform
sonar.projectName=AutoOps Platform
sonar.projectVersion=1.0
sonar.host.url=http://sonarqube:9000

sonar.sources=services
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/vendor/**,**/tests/**,**/*.test.js,**/test_*.py

sonar.javascript.lcov.reportPaths=services/api-gateway/coverage/lcov.info
sonar.python.coverage.reportPaths=services/user-service/coverage.xml
sonar.go.coverage.reportPaths=services/metrics-collector/coverage.out

# Quality gate thresholds are configured in SonarQube UI:
# Coverage > 60%, Duplications < 10%, Maintainability Rating A,
# Reliability Rating A, Security Rating A
