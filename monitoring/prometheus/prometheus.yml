global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: autoops-local
    environment: development

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # API Gateway (Node.js / prom-client)
  - job_name: api-gateway
    static_configs:
      - targets: ['api-gateway:3000']
    metrics_path: /metrics
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service
        replacement: api-gateway

  # User Service (Python / prometheus-fastapi-instrumentator)
  - job_name: user-service
    static_configs:
      - targets: ['user-service:8000']
    metrics_path: /metrics
    scrape_interval: 10s
    relabel_configs:
      - target_label: service
        replacement: user-service

  # Metrics Collector (Go / client_golang) — Prometheus port 9090
  - job_name: metrics-collector
    static_configs:
      - targets: ['metrics-collector:9090']
    metrics_path: /metrics
    scrape_interval: 15s
    relabel_configs:
      - target_label: service
        replacement: metrics-collector

  # Healing Service (Python / prometheus-client)
  - job_name: healing-service
    static_configs:
      - targets: ['healing-service:8888']
    metrics_path: /metrics
    scrape_interval: 15s
    relabel_configs:
      - target_label: service
        replacement: healing-service

  # Node Exporter — host-level metrics
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor — container-level metrics
  # Uncomment when cadvisor container is running locally
  # - job_name: cadvisor
  #   static_configs:
  #     - targets: ['cadvisor:8080']
  #   metrics_path: /metrics
