groups:
  - name: autoops.slo.recording
    rules:
      # ── Success / error rates ──────────────────────────────────
      - record: autoops:http_request_success_rate:5m
        expr: |
          sum(rate(http_requests_total{status_code=~"2.."}[5m])) by (service)
          /
          sum(rate(http_requests_total[5m])) by (service)

      - record: autoops:http_request_error_rate:5m
        expr: |
          sum(rate(http_requests_total{status_code=~"5.."}[5m])) by (service)
          /
          sum(rate(http_requests_total[5m])) by (service)

      - record: autoops:http_request_4xx_rate:5m
        expr: |
          sum(rate(http_requests_total{status_code=~"4.."}[5m])) by (service)
          /
          sum(rate(http_requests_total[5m])) by (service)

      # ── Latency percentiles ────────────────────────────────────
      - record: autoops:http_p50_latency:5m
        expr: |
          histogram_quantile(
            0.50,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (service, le)
          )

      - record: autoops:http_p95_latency:5m
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (service, le)
          )

      - record: autoops:http_p99_latency:5m
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (service, le)
          )

      # ── Availability (rolling 1h) ──────────────────────────────
      - record: autoops:availability:1h
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"2.."}[1h])) by (service)
            /
            sum(rate(http_requests_total[1h])) by (service)
          ) * 100

      # ── Request throughput ─────────────────────────────────────
      - record: autoops:http_request_rate:5m
        expr: |
          sum(rate(http_requests_total[5m])) by (service)
