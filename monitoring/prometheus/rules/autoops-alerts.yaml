groups:
  # ─────────────────────────────────────────────────────────────
  # Availability alerts
  # ─────────────────────────────────────────────────────────────
  - name: autoops.availability
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job=~"api-gateway|user-service|metrics-collector"} == 0
        for: 1m
        labels:
          severity: critical
          team: devops
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for more than 1 minute"
          runbook: "https://github.com/YOUR_ORG/autoops-platform/docs/alert-runbooks/pod-crashloop.md"

      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{status_code=~"5.."}[5m])
            /
            rate(http_requests_total[5m])
          ) > 0.05
        for: 2m
        labels:
          severity: critical
          team: devops
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.service }}"
          runbook: "https://github.com/YOUR_ORG/autoops-platform/docs/alert-runbooks/high-error-rate.md"

      - alert: HighLatency
        expr: |
          histogram_quantile(
            0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 0.5
        for: 3m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "High P95 latency on {{ $labels.service }}"
          description: "P95 latency is {{ $value | humanizeDuration }} on {{ $labels.service }}"
          runbook: "https://github.com/YOUR_ORG/autoops-platform/docs/alert-runbooks/high-error-rate.md"

      - alert: PodCrashLooping
        expr: |
          rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 3
        for: 5m
        labels:
          severity: critical
          team: devops
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times"
          runbook: "https://github.com/YOUR_ORG/autoops-platform/docs/alert-runbooks/pod-crashloop.md"

      - alert: HPAMaxReplicas
        expr: |
          kube_horizontalpodautoscaler_status_current_replicas
          >= kube_horizontalpodautoscaler_spec_max_replicas
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "HPA {{ $labels.horizontalpodautoscaler }} at max replicas"
          description: "HPA has reached maximum replicas. May need manual scaling."

  # ─────────────────────────────────────────────────────────────
  # SLO alerts
  # ─────────────────────────────────────────────────────────────
  - name: autoops.slo
    rules:
      - alert: SLOBreach
        expr: |
          (
            1 - (
              rate(http_requests_total{status_code=~"2.."}[1h])
              /
              rate(http_requests_total[1h])
            )
          ) > 0.001
        for: 5m
        labels:
          severity: critical
          slo: availability
          team: devops
        annotations:
          summary: "SLO breach: availability below 99.9%"
          description: "Current availability is {{ $value | humanizePercentage }}. SLO target is 99.9%"
          runbook: "https://github.com/YOUR_ORG/autoops-platform/docs/alert-runbooks/high-error-rate.md"

      - alert: ErrorBudgetBurnRateHigh
        expr: |
          (
            1 - autoops:http_request_success_rate:5m
          ) / 0.001 > 14.4
        for: 2m
        labels:
          severity: critical
          slo: availability
          team: devops
        annotations:
          summary: "Error budget burning fast on {{ $labels.service }}"
          description: "Burn rate is {{ $value }}x the allowed rate. Monthly budget will be exhausted in < 1 hour."
          runbook: "https://github.com/YOUR_ORG/autoops-platform/docs/alert-runbooks/high-error-rate.md"
