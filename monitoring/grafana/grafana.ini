[server]
http_port = 3001
root_url = http://localhost:3001

[security]
admin_user = admin
admin_password = autoops-grafana-2024
allow_embedding = true
cookie_secure = false

[users]
allow_sign_up = false
default_theme = dark

[auth.anonymous]
enabled = false

[dashboards]
default_home_dashboard_path = /etc/grafana/dashboards/autoops-overview.json

[alerting]
enabled = true

[unified_alerting]
enabled = false

[log]
mode = console
level = info

[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning
