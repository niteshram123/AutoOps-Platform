global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'autoops-alerts@yourdomain.com'
  smtp_require_tls: true
  resolve_timeout: 5m

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'service', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-webhook'

  routes:
    # Critical alerts — fast notification + email
    - match:
        severity: critical
      receiver: critical-webhook
      group_wait: 10s
      repeat_interval: 1h
      continue: true   # also falls through to default-webhook

    # Warning alerts — slower cadence
    - match:
        severity: warning
      receiver: warning-webhook
      group_wait: 60s
      repeat_interval: 6h

    # SLO breach — immediate, no grouping delay
    - match:
        slo: availability
      receiver: slo-webhook
      group_wait: 0s
      repeat_interval: 30m

receivers:
  - name: 'default-webhook'
    webhook_configs:
      - url: 'http://healing-service:8888/webhook/alert'
        send_resolved: true
        http_config:
          bearer_token: 'autoops-webhook-secret'

  - name: 'critical-webhook'
    webhook_configs:
      - url: 'http://healing-service:8888/webhook/critical'
        send_resolved: true
        http_config:
          bearer_token: 'autoops-webhook-secret'
    email_configs:
      - to: 'devops-team@autoops.io'
        subject: '[CRITICAL] {{ .GroupLabels.alertname }} - AutoOps Platform'
        body: '{{ template "email.default.html" . }}'
        send_resolved: true

  - name: 'warning-webhook'
    webhook_configs:
      - url: 'http://healing-service:8888/webhook/alert'
        send_resolved: true
        http_config:
          bearer_token: 'autoops-webhook-secret'

  - name: 'slo-webhook'
    webhook_configs:
      - url: 'http://healing-service:8888/webhook/slo'
        send_resolved: true
        http_config:
          bearer_token: 'autoops-webhook-secret'

# Suppress warning-level alerts when a critical alert is already firing
# for the same service — avoids alert fatigue.
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['service']
